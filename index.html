<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Hand Box — Mr.Hem</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { background:#000; overflow:hidden; }
#app { width:100vw; height:100vh; position:relative; }
#videoEl { position:absolute; width:1px; height:1px; opacity:0; pointer-events:none; }
#threeCanvas { position:absolute; top:0; left:0; width:100%; height:100%; z-index:1; }

/* Title */
#title {
  position:absolute; top:18px; left:50%; transform:translateX(-50%);
  z-index:10; font-family:'Courier New',monospace;
  font-size:clamp(10px,3vw,15px); letter-spacing:0.35em;
  color:#00f5ff; text-transform:uppercase; white-space:nowrap;
  text-shadow:0 0 8px #00f5ff,0 0 25px #00f5ff,0 0 50px #00aaff;
  animation:glow 2.5s ease-in-out infinite;
}
@keyframes glow {
  0%,100%{text-shadow:0 0 8px #00f5ff,0 0 25px #00f5ff,0 0 50px #00aaff;}
  50%{text-shadow:0 0 4px #00f5ff,0 0 12px #00f5ff,0 0 28px #00aaff;}
}

/* Gesture Guide — bottom */
#guide {
  position:absolute; bottom:0; left:0; right:0;
  z-index:10; display:flex; justify-content:center; gap:clamp(12px,4vw,32px);
  padding:10px 16px 14px; background:linear-gradient(transparent,rgba(0,0,0,0.7));
}
.gc {
  display:flex; flex-direction:column; align-items:center; gap:4px;
}
.gc-icon {
  font-size:clamp(18px,5vw,26px); line-height:1;
}
.gc-label {
  font-family:'Courier New',monospace; font-size:clamp(7px,1.8vw,10px);
  color:rgba(0,245,255,0.55); letter-spacing:0.1em; text-transform:uppercase;
  text-align:center; white-space:nowrap;
}

/* Status */
#status {
  position:absolute; top:18px; right:14px; z-index:10;
  display:flex; align-items:center; gap:6px;
}
#dot {
  width:8px; height:8px; border-radius:50%;
  background:#ff3333; box-shadow:0 0 8px #ff3333;
  transition:all 0.4s;
}
#dot.on { background:#00ff88; box-shadow:0 0 8px #00ff88,0 0 20px #00ff88; }
#dotLabel {
  font-family:'Courier New',monospace; font-size:9px;
  letter-spacing:0.15em; color:rgba(255,255,255,0.35); text-transform:uppercase;
}

/* Gesture feedback */
#gestureHint {
  position:absolute; top:52px; left:50%; transform:translateX(-50%);
  z-index:10; font-family:'Courier New',monospace;
  font-size:clamp(9px,2.5vw,13px); letter-spacing:0.2em;
  color:#ffcc00; text-shadow:0 0 12px #ffcc00;
  text-transform:uppercase; white-space:nowrap;
  opacity:0; transition:opacity 0.2s;
  pointer-events:none;
}

/* Box count */
#boxCount {
  position:absolute; top:18px; left:14px; z-index:10;
  font-family:'Courier New',monospace; font-size:10px;
  letter-spacing:0.2em; color:rgba(0,245,255,0.45);
}

/* Corners */
.corner { position:absolute; z-index:10; width:22px; height:22px; opacity:0.4; }
.tl{top:6px;left:6px;border-top:1.5px solid #00f5ff;border-left:1.5px solid #00f5ff;}
.tr{top:6px;right:6px;border-top:1.5px solid #00f5ff;border-right:1.5px solid #00f5ff;}
.bl{bottom:6px;left:6px;border-bottom:1.5px solid #00f5ff;border-left:1.5px solid #00f5ff;}
.br{bottom:6px;right:6px;border-bottom:1.5px solid #00f5ff;border-right:1.5px solid #00f5ff;}
</style>
</head>
<body>
<div id="app">
  <video id="videoEl" playsinline autoplay muted></video>
  <canvas id="threeCanvas"></canvas>

  <div class="corner tl"></div>
  <div class="corner tr"></div>
  <div class="corner bl"></div>
  <div class="corner br"></div>

  <div id="title">DEVELOPER &nbsp;&nbsp; Mr.Hem</div>
  <div id="gestureHint"></div>
  <div id="boxCount">BOXES: 0</div>

  <div id="status">
    <div id="dot"></div>
    <div id="dotLabel">HAND</div>
  </div>

  <!-- Gesture guide at bottom -->
  <div id="guide">
    <div class="gc"><div class="gc-icon">🤏</div><div class="gc-label">Pinch<br>Create</div></div>
    <div class="gc"><div class="gc-icon">✋</div><div class="gc-label">Open<br>Move</div></div>
    <div class="gc"><div class="gc-icon">👊</div><div class="gc-label">Fist<br>Delete</div></div>
    <div class="gc"><div class="gc-icon">🤌</div><div class="gc-label">Grab<br>Drag</div></div>
    <div class="gc"><div class="gc-icon">🖐️</div><div class="gc-label">Spread<br>Grow</div></div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
<script>
(function(){
"use strict";

// ── RENDERER ──────────────────────────────────────────────────────
var canvas = document.getElementById('threeCanvas');
var renderer = new THREE.WebGLRenderer({ canvas: canvas, antialias: false });
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setClearColor(0x000912, 1);

var scene = new THREE.Scene();
scene.fog = new THREE.FogExp2(0x000912, 0.028);

var cam = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 200);
cam.position.set(0, 0, 10);

window.addEventListener('resize', function(){
  renderer.setSize(window.innerWidth, window.innerHeight);
  cam.aspect = window.innerWidth / window.innerHeight;
  cam.updateProjectionMatrix();
});

// ── LIGHTS ────────────────────────────────────────────────────────
scene.add(new THREE.AmbientLight(0x112244, 3.5));
var pl1 = new THREE.PointLight(0x00f5ff, 4, 45);
pl1.position.set(6, 6, 6); scene.add(pl1);
var pl2 = new THREE.PointLight(0xff00cc, 3, 30);
pl2.position.set(-6, -4, 4); scene.add(pl2);

// ── STARFIELD ─────────────────────────────────────────────────────
(function(){
  var n=600, pos=new Float32Array(n*3), col=new Float32Array(n*3);
  for(var i=0;i<n;i++){
    pos[i*3]=(Math.random()-.5)*130;
    pos[i*3+1]=(Math.random()-.5)*130;
    pos[i*3+2]=(Math.random()-.5)*80-25;
    col[i*3]=Math.random()*.2; col[i*3+1]=Math.random()*.6+.4; col[i*3+2]=1;
  }
  var g=new THREE.BufferGeometry();
  g.setAttribute('position',new THREE.BufferAttribute(pos,3));
  g.setAttribute('color',new THREE.BufferAttribute(col,3));
  scene.add(new THREE.Points(g,new THREE.PointsMaterial({size:.06,vertexColors:true,transparent:true,opacity:.55})));
})();

// ── GRID FLOOR ────────────────────────────────────────────────────
(function(){
  var grid = new THREE.GridHelper(30, 30, 0x003355, 0x001122);
  grid.position.y = -5;
  grid.material.transparent = true;
  grid.material.opacity = 0.35;
  scene.add(grid);
})();

// ── HELPERS ───────────────────────────────────────────────────────
function lm3d(lm, idx){
  var x = (0.5 - lm[idx].x) * 12;
  var y = (0.5 - lm[idx].y) * 12 * (window.innerHeight / window.innerWidth);
  return new THREE.Vector3(x, y, 0);
}
function palmPos(lm){ return lm3d(lm, 9); }

function pinchDist(lm){
  var t = new THREE.Vector3(lm[4].x, lm[4].y, lm[4].z);
  var i = new THREE.Vector3(lm[8].x, lm[8].y, lm[8].z);
  return t.distanceTo(i);
}
function pinchStr(lm){ return Math.max(0, 1 - pinchDist(lm) * 18); }

function isFist(lm){
  var c=0;
  var pairs=[[8,5],[12,9],[16,13],[20,17]];
  for(var i=0;i<pairs.length;i++) if(lm[pairs[i][0]].y > lm[pairs[i][1]].y + 0.02) c++;
  return c >= 3;
}

function handSpread(lm){
  var tips=[4,8,12,16,20], mx=0;
  for(var i=0;i<tips.length;i++) for(var j=i+1;j<tips.length;j++){
    var d=Math.hypot(lm[tips[i]].x-lm[tips[j]].x, lm[tips[i]].y-lm[tips[j]].y);
    if(d>mx) mx=d;
  }
  return mx; // 0.1 (closed) to ~0.5 (wide open)
}

function circleTex(c1,c2){
  var cv=document.createElement('canvas'); cv.width=cv.height=64;
  var cx=cv.getContext('2d');
  var gd=cx.createRadialGradient(32,32,0,32,32,32);
  gd.addColorStop(0,c1); gd.addColorStop(1,c2);
  cx.fillStyle=gd; cx.beginPath(); cx.arc(32,32,32,0,Math.PI*2); cx.fill();
  return new THREE.CanvasTexture(cv);
}

// ── CURSOR HAND INDICATOR ─────────────────────────────────────────
var cursorG = new THREE.Group(); scene.add(cursorG);
// Outer ring
var cursorRing = new THREE.Mesh(
  new THREE.RingGeometry(.15, .20, 32),
  new THREE.MeshBasicMaterial({color:0x00f5ff, side:THREE.DoubleSide, transparent:true, opacity:.85})
);
cursorG.add(cursorRing);
// Inner dot
cursorG.add(new THREE.Mesh(
  new THREE.SphereGeometry(.05, 8, 8),
  new THREE.MeshBasicMaterial({color:0xffffff})
));
// Pinch indicator ring (changes color on pinch)
var pinchRing = new THREE.Mesh(
  new THREE.RingGeometry(.22, .25, 32),
  new THREE.MeshBasicMaterial({color:0x00ff88, side:THREE.DoubleSide, transparent:true, opacity:0})
);
cursorG.add(pinchRing);
cursorG.visible = false;

// Finger tip dots
var fDots = [];
var fDotColors = [0xffaa00, 0x00ff88, 0x00f5ff, 0xff00cc, 0xffff00];
var TIPS = [4, 8, 12, 16, 20];
for(var i=0;i<5;i++){
  var fd = new THREE.Mesh(
    new THREE.SphereGeometry(.06, 7, 7),
    new THREE.MeshBasicMaterial({color:fDotColors[i], transparent:true, opacity:.8})
  );
  scene.add(fd); fd.visible=false; fDots.push(fd);
}

// ── SPARKLE SYSTEM ────────────────────────────────────────────────
var SK = 300;
var skPos = new Float32Array(SK*3);
var skCol = new Float32Array(SK*3);
var skVel = [], skLf = new Float32Array(SK), skIdx = 0;
for(var si=0;si<SK;si++){ skPos[si*3]=9999; skVel.push(new THREE.Vector3()); skLf[si]=0; }
var skGeo = new THREE.BufferGeometry();
skGeo.setAttribute('position', new THREE.BufferAttribute(skPos,3));
skGeo.setAttribute('color',    new THREE.BufferAttribute(skCol,3));
var skTex = circleTex('rgba(255,255,255,1)','rgba(0,200,255,0)');
var sparkSystem = new THREE.Points(skGeo, new THREE.PointsMaterial({
  size:.13, map:skTex, vertexColors:true,
  blending:THREE.AdditiveBlending, depthWrite:false, transparent:true
}));
scene.add(sparkSystem);

function spawnSparks(pos, col, count){
  count = count||8;
  var r=(col>>16&0xff)/255, g=(col>>8&0xff)/255, b=(col&0xff)/255;
  for(var k=0;k<count;k++){
    var i=skIdx%SK; skIdx++;
    skPos[i*3]=pos.x; skPos[i*3+1]=pos.y; skPos[i*3+2]=pos.z;
    skVel[i].set((Math.random()-.5)*.13,(Math.random()-.5)*.13,(Math.random()-.5)*.13);
    skLf[i]=1.0; skCol[i*3]=r; skCol[i*3+1]=g; skCol[i*3+2]=b;
  }
}
function updateSparks(){
  for(var i=0;i<SK;i++){
    if(skLf[i]<=0) continue;
    skPos[i*3]+=skVel[i].x; skPos[i*3+1]+=skVel[i].y; skPos[i*3+2]+=skVel[i].z;
    skLf[i]-=.04; if(skLf[i]<=0) skPos[i*3]=9999;
  }
  skGeo.attributes.position.needsUpdate = true;
}

// ── BOXES ─────────────────────────────────────────────────────────
var boxGroup = new THREE.Group(); scene.add(boxGroup);
var boxes = [];
var BOX_COLS = [0x00f5ff, 0xff00aa, 0x00ff88, 0xffaa00, 0x8800ff, 0xff4466, 0xff8800, 0x44ffff];
var boxCountEl = document.getElementById('boxCount');

function makeBox(pos){
  var col = BOX_COLS[Math.floor(Math.random() * BOX_COLS.length)];
  var sz  = 0.35 + Math.random() * 0.3;
  var g   = new THREE.Group();

  // Solid face (faint)
  g.add(new THREE.Mesh(
    new THREE.BoxGeometry(sz, sz, sz),
    new THREE.MeshPhongMaterial({
      color: col, emissive: col, emissiveIntensity: 0.15,
      transparent: true, opacity: 0.12
    })
  ));
  // Glowing edges
  g.add(new THREE.LineSegments(
    new THREE.EdgesGeometry(new THREE.BoxGeometry(sz, sz, sz)),
    new THREE.LineBasicMaterial({ color: col, linewidth: 2 })
  ));
  // Outer glow shell
  g.add(new THREE.Mesh(
    new THREE.BoxGeometry(sz*1.15, sz*1.15, sz*1.15),
    new THREE.MeshBasicMaterial({ color: col, transparent: true, opacity: 0.04, side: THREE.BackSide })
  ));
  // Point light inside
  var pl = new THREE.PointLight(col, 2, 3); g.add(pl);

  g.position.copy(pos);
  g.userData = {
    col: col, sz: sz,
    vel: new THREE.Vector3((Math.random()-.5)*.004, (Math.random()-.5)*.004, 0),
    rv:  new THREE.Vector3(Math.random()*.01, Math.random()*.01, Math.random()*.005),
    held: false, growing: false, baseScale: 1
  };
  boxGroup.add(g);
  boxes.push(g);
  boxCountEl.textContent = 'BOXES: ' + boxes.length;
  return g;
}

function deleteBox(b){
  spawnSparks(b.position, b.userData.col, 20);
  boxGroup.remove(b);
  // Dispose
  b.traverse(function(obj){
    if(obj.geometry) obj.geometry.dispose();
    if(obj.material) obj.material.dispose();
  });
  var idx = boxes.indexOf(b);
  if(idx > -1) boxes.splice(idx, 1);
  boxCountEl.textContent = 'BOXES: ' + boxes.length;
}

// ── GESTURE HUD ───────────────────────────────────────────────────
var ghEl = document.getElementById('gestureHint');
var ghTimer = null;
function showGesture(txt, col){
  ghEl.textContent = txt;
  ghEl.style.color = col || '#ffcc00';
  ghEl.style.textShadow = '0 0 12px ' + (col||'#ffcc00');
  ghEl.style.opacity = '1';
  if(ghTimer) clearTimeout(ghTimer);
  ghTimer = setTimeout(function(){ ghEl.style.opacity='0'; }, 900);
}

// ── HAND TRACKING ─────────────────────────────────────────────────
var handLM = null, prevLM = null;
var dotEl = document.getElementById('dot');
var video  = document.getElementById('videoEl');

try {
  var mpH = new Hands({ locateFile: function(f){ return 'https://cdn.jsdelivr.net/npm/@mediapipe/hands/' + f; }});
  mpH.setOptions({ maxNumHands:1, modelComplexity:0, minDetectionConfidence:0.65, minTrackingConfidence:0.55 });
  mpH.onResults(function(r){
    prevLM = handLM;
    handLM = (r.multiHandLandmarks && r.multiHandLandmarks.length > 0) ? r.multiHandLandmarks[0] : null;
    dotEl.className = handLM ? 'on' : '';
  });
  navigator.mediaDevices.getUserMedia({ video:{ facingMode:'user', width:320, height:240 } })
    .then(function(stream){
      video.srcObject = stream;
      video.onloadedmetadata = function(){
        video.play();
        var mc = new Camera(video, {
          onFrame: async function(){ await mpH.send({ image: video }); },
          width: 320, height: 240
        });
        mc.start();
      };
    })
    .catch(function(e){ console.warn('Camera:', e); });
} catch(e){ console.warn('MediaPipe:', e); }

// ── STATE ─────────────────────────────────────────────────────────
var heldBox      = null;  // box being dragged
var prevPinch    = false;
var createCD     = 0;     // cooldown frames for creation
var fistFrames   = 0;     // frames fist held (for delete)
var fistBox      = null;  // box under fist for deletion
var spreadActive = false;
var lastPalmPos  = new THREE.Vector3();
var gestureState = 'idle'; // idle | creating | holding | growing | deleting

// ── MAIN LOOP ─────────────────────────────────────────────────────
var t = 0, last = performance.now();

function loop(){
  requestAnimationFrame(loop);
  var now = performance.now(), dt = Math.min((now-last)/1000, 0.05);
  last = now; t += dt;

  var lm  = handLM;
  var pp  = lm ? palmPos(lm) : null;
  var pinch   = lm ? pinchStr(lm) : 0;
  var isPinch = pinch > 0.70;
  var fist    = lm ? isFist(lm) : false;
  var sp      = lm ? handSpread(lm) : 0;

  if(createCD > 0) createCD--;

  // ─ CURSOR UPDATE ──────────────────────────────────────────────
  if(lm && pp){
    cursorG.visible = true;
    cursorG.position.lerp(pp, 0.30);
    cursorG.rotation.z += dt * (isPinch ? 4 : 1.2);

    // Pinch ring color/opacity
    pinchRing.material.opacity   = isPinch ? 0.9 : 0.0;
    pinchRing.material.color.set(isPinch ? 0xffcc00 : 0x00ff88);

    // Finger tips
    for(var fd=0;fd<5;fd++){
      fDots[fd].visible = true;
      fDots[fd].position.lerp(lm3d(lm, TIPS[fd]), 0.22);
    }
  } else {
    cursorG.visible = false;
    for(var fd2=0;fd2<5;fd2++) fDots[fd2].visible = false;
  }

  // ─ GESTURE LOGIC ──────────────────────────────────────────────
  if(lm && pp){

    // ── FIST = Delete nearest box ──
    if(fist){
      fistFrames++;
      if(fistFrames === 1){
        // find nearest box to palm
        var nearD = 2.0, nearB = null;
        for(var bi=0;bi<boxes.length;bi++){
          var d = boxes[bi].position.distanceTo(pp);
          if(d < nearD){ nearD=d; nearB=boxes[bi]; }
        }
        fistBox = nearB;
      }
      if(fistFrames === 8 && fistBox){
        deleteBox(fistBox);
        fistBox = null;
        showGesture('💥  DELETED', '#ff4466');
      }
      gestureState = 'deleting';

    } else {
      if(fistFrames > 0){ fistFrames=0; fistBox=null; }

      // ── PINCH = Create or Grab ──
      if(isPinch && !prevPinch && createCD <= 0){
        // Check if near existing box → grab it
        var nearD2=1.4, nearB2=null;
        for(var bi2=0;bi2<boxes.length;bi2++){
          var d2 = boxes[bi2].position.distanceTo(pp);
          if(d2 < nearD2){ nearD2=d2; nearB2=boxes[bi2]; }
        }
        if(nearB2){
          heldBox = nearB2;
          heldBox.userData.held = true;
          showGesture('✊  GRABBED', '#ffcc00');
          gestureState = 'holding';
        } else {
          // Create new box
          heldBox = makeBox(pp.clone());
          heldBox.userData.held = true;
          spawnSparks(pp, heldBox.userData.col, 15);
          showGesture('✨  CREATED', '#00ff88');
          gestureState = 'creating';
          createCD = 22;
        }
      }

      // ── Holding box → move it ──
      if(heldBox && isPinch){
        heldBox.position.lerp(pp, 0.25);
        // Rotate based on hand movement
        if(prevLM){
          var dx = (lm[9].x - prevLM[9].x) * 10;
          var dy = (lm[9].y - prevLM[9].y) * 10;
          heldBox.rotation.y += dx;
          heldBox.rotation.x += dy;
        }
        gestureState = 'holding';
      }

      // ── Release pinch → drop box ──
      if(!isPinch && prevPinch && heldBox){
        heldBox.userData.held = false;
        heldBox.userData.vel.set((Math.random()-.5)*.012, Math.random()*.008, 0);
        spawnSparks(heldBox.position, heldBox.userData.col, 10);
        showGesture('🎯  PLACED', '#00f5ff');
        heldBox = null;
        gestureState = 'idle';
      }

      // ── SPREAD (no pinch, no fist) = Grow nearest box ──
      if(!isPinch && !fist && sp > 0.28 && boxes.length > 0){
        var nearD3=3.0, nearB3=null;
        for(var bi3=0;bi3<boxes.length;bi3++){
          if(boxes[bi3].userData.held) continue;
          var d3 = boxes[bi3].position.distanceTo(pp);
          if(d3 < nearD3){ nearD3=d3; nearB3=boxes[bi3]; }
        }
        if(nearB3){
          var targetSc = 0.4 + sp * 5.5;
          targetSc = Math.max(0.2, Math.min(3.5, targetSc));
          nearB3.scale.lerp(new THREE.Vector3(targetSc,targetSc,targetSc), 0.08);
          gestureState = 'growing';
          if(!spreadActive) showGesture('🌟  GROWING', '#ffaa00');
          spreadActive = true;
        }
      } else {
        spreadActive = false;
      }
    }

    prevPinch = isPinch;
    lastPalmPos.copy(pp);

  } else {
    // No hand → release held box
    if(heldBox){ heldBox.userData.held=false; heldBox=null; }
    prevPinch = false;
    fistFrames = 0; fistBox = null;
    gestureState = 'idle';
  }

  // ── UPDATE ALL BOXES ──────────────────────────────────────────
  for(var bi4=0;bi4<boxes.length;bi4++){
    var b = boxes[bi4];
    if(!b.userData.held){
      b.position.add(b.userData.vel);
      b.rotation.x += b.userData.rv.x;
      b.rotation.y += b.userData.rv.y;
      b.rotation.z += b.userData.rv.z;
      // Soft boundary bounce
      if(Math.abs(b.position.x) > 6.0) b.userData.vel.x *= -0.85;
      if(Math.abs(b.position.y) > 4.5) b.userData.vel.y *= -0.85;
      // Occasional sparks for floating boxes
      if(Math.random() < 0.012) spawnSparks(b.position, b.userData.col, 2);
    }
  }

  updateSparks();

  // Animate scene lights
  pl1.position.set(Math.sin(t*.45)*8, Math.cos(t*.28)*6, 5);
  pl2.position.set(Math.cos(t*.38)*7, Math.sin(t*.55)*5, 4);

  renderer.render(scene, cam);
}

loop();

})();
</script>
</body>
</html>
