<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Hand Tracking — Mr.Hem</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { background:#000; overflow:hidden; touch-action:none; }
#app { position:relative; width:100vw; height:100vh; }
#videoEl { position:absolute; width:1px; height:1px; opacity:0; pointer-events:none; }
#threeCanvas { position:absolute; top:0; left:0; width:100%; height:100%; z-index:1; }
#title {
  position:absolute; top:22px; left:50%; transform:translateX(-50%);
  z-index:10; font-size:clamp(10px,2.8vw,16px); font-family:'Courier New',monospace;
  letter-spacing:0.35em; color:#00f5ff; text-transform:uppercase; white-space:nowrap;
  text-shadow:0 0 6px #00f5ff,0 0 20px #00f5ff,0 0 45px #00aeff,0 0 90px #0066ff;
  animation:pulse 3s ease-in-out infinite;
}
@keyframes pulse {
  0%,100%{opacity:1;text-shadow:0 0 6px #00f5ff,0 0 20px #00f5ff,0 0 45px #00aeff,0 0 90px #0066ff;}
  50%{opacity:0.8;text-shadow:0 0 3px #00f5ff,0 0 10px #00f5ff,0 0 25px #00aeff;}
}
#modeLabel {
  position:absolute; top:50%; left:50%; transform:translate(-50%,-50%);
  z-index:20; font-size:clamp(16px,5vw,34px); font-family:'Courier New',monospace;
  letter-spacing:0.3em; color:#fff; text-transform:uppercase; pointer-events:none;
  opacity:0; text-shadow:0 0 20px #00f5ff,0 0 50px #00aeff;
  transition:opacity 0.3s ease;
}
#statusDot {
  position:absolute; bottom:28px; left:50%; transform:translateX(-50%);
  z-index:10; width:8px; height:8px; border-radius:50%;
  background:#ff3333; box-shadow:0 0 10px #ff3333; transition:all 0.4s;
}
#statusDot.on { background:#00ff88; box-shadow:0 0 10px #00ff88,0 0 25px #00ff88; }
#hint {
  position:absolute; bottom:46px; left:50%; transform:translateX(-50%);
  z-index:10; font-size:9px; letter-spacing:0.18em; color:rgba(0,245,255,0.35);
  white-space:nowrap; font-family:'Courier New',monospace;
}
#scanline {
  position:absolute; top:0; left:0; width:100%; height:100%;
  z-index:5; pointer-events:none;
  background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,245,255,0.01) 2px,rgba(0,245,255,0.01) 4px);
}
#cTL,#cTR,#cBL,#cBR { position:absolute; z-index:10; width:28px; height:28px; pointer-events:none; opacity:0.45; }
#cTL{top:8px;left:8px;border-top:1.5px solid #00f5ff;border-left:1.5px solid #00f5ff;}
#cTR{top:8px;right:8px;border-top:1.5px solid #00f5ff;border-right:1.5px solid #00f5ff;}
#cBL{bottom:8px;left:8px;border-bottom:1.5px solid #00f5ff;border-left:1.5px solid #00f5ff;}
#cBR{bottom:8px;right:8px;border-bottom:1.5px solid #00f5ff;border-right:1.5px solid #00f5ff;}
</style>
</head>
<body>
<div id="app">
  <video id="videoEl" playsinline autoplay muted></video>
  <canvas id="threeCanvas"></canvas>
  <div id="scanline"></div>
  <div id="cTL"></div><div id="cTR"></div><div id="cBL"></div><div id="cBR"></div>
  <div id="title">DEVELOPER &nbsp;&nbsp; Mr.Hem</div>
  <div id="modeLabel"></div>
  <div id="hint">SWIPE TWO FINGERS LEFT / RIGHT TO SWITCH MODE</div>
  <div id="statusDot"></div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
<script>
(function(){
"use strict";

// ══ RENDERER ══════════════════════════════════════════════════════
const canvas = document.getElementById('threeCanvas');
const renderer = new THREE.WebGLRenderer({ canvas, antialias: false });
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setClearColor(0x000810, 1);

const scene = new THREE.Scene();
scene.fog = new THREE.FogExp2(0x000810, 0.032);

const cam = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 200);
cam.position.set(0, 0, 9);

window.addEventListener('resize', () => {
  renderer.setSize(window.innerWidth, window.innerHeight);
  cam.aspect = window.innerWidth / window.innerHeight;
  cam.updateProjectionMatrix();
});

// ══ LIGHTS ════════════════════════════════════════════════════════
scene.add(new THREE.AmbientLight(0x112244, 3));
const pl1 = new THREE.PointLight(0x00f5ff, 4, 40);
pl1.position.set(5, 5, 5);
scene.add(pl1);
const pl2 = new THREE.PointLight(0xff00cc, 3, 30);
pl2.position.set(-5, -3, 3);
scene.add(pl2);

// ══ STARFIELD ═════════════════════════════════════════════════════
(function(){
  var n=700, pos=new Float32Array(n*3), col=new Float32Array(n*3);
  for(var i=0;i<n;i++){
    pos[i*3]=(Math.random()-.5)*120;
    pos[i*3+1]=(Math.random()-.5)*120;
    pos[i*3+2]=(Math.random()-.5)*80-20;
    col[i*3]=Math.random()*.3; col[i*3+1]=Math.random()*.7+.3; col[i*3+2]=1;
  }
  var g=new THREE.BufferGeometry();
  g.setAttribute('position',new THREE.BufferAttribute(pos,3));
  g.setAttribute('color',new THREE.BufferAttribute(col,3));
  scene.add(new THREE.Points(g,new THREE.PointsMaterial({size:.07,vertexColors:true,transparent:true,opacity:.6})));
})();

// ══ CIRCLE TEXTURE ════════════════════════════════════════════════
function circleTex(c1,c2,sz){
  sz=sz||64;
  var cv=document.createElement('canvas'); cv.width=cv.height=sz;
  var cx=cv.getContext('2d');
  var gd=cx.createRadialGradient(sz/2,sz/2,0,sz/2,sz/2,sz/2);
  gd.addColorStop(0,c1); gd.addColorStop(1,c2);
  cx.fillStyle=gd; cx.beginPath(); cx.arc(sz/2,sz/2,sz/2,0,Math.PI*2); cx.fill();
  return new THREE.CanvasTexture(cv);
}

// ══ HELPERS ═══════════════════════════════════════════════════════
function lm3d(lm,idx){
  var x=(0.5-lm[idx].x)*11;
  var y=(0.5-lm[idx].y)*11*(window.innerHeight/window.innerWidth);
  return new THREE.Vector3(x,y,0);
}
function palmPos(lm){ return lm3d(lm,9); }
function pinchStr(lm){
  var t=new THREE.Vector3(lm[4].x,lm[4].y,lm[4].z);
  var i=new THREE.Vector3(lm[8].x,lm[8].y,lm[8].z);
  return Math.max(0,1-t.distanceTo(i)*18);
}
function isFist(lm){
  var c=0;
  var pairs=[[8,6],[12,10],[16,14],[20,18]];
  for(var i=0;i<pairs.length;i++) if(lm[pairs[i][0]].y>lm[pairs[i][1]].y) c++;
  return c>=3;
}
function handSpread(lm){
  var tips=[4,8,12,16,20],mx=0;
  for(var i=0;i<tips.length;i++) for(var j=i+1;j<tips.length;j++){
    var d=Math.hypot(lm[tips[i]].x-lm[tips[j]].x,lm[tips[i]].y-lm[tips[j]].y);
    if(d>mx) mx=d;
  }
  return mx;
}

// ══ CURSOR ════════════════════════════════════════════════════════
var cursorG=new THREE.Group(); scene.add(cursorG);
cursorG.add(new THREE.Mesh(new THREE.RingGeometry(.12,.16,32),new THREE.MeshBasicMaterial({color:0x00f5ff,side:THREE.DoubleSide,transparent:true,opacity:.9})));
cursorG.add(new THREE.Mesh(new THREE.SphereGeometry(.04,8,8),new THREE.MeshBasicMaterial({color:0xffffff})));
cursorG.visible=false;

var fDots=[];
for(var fd=0;fd<5;fd++){
  var fdm=new THREE.Mesh(new THREE.SphereGeometry(.055,7,7),new THREE.MeshBasicMaterial({color:0x00ff88,transparent:true,opacity:.75}));
  scene.add(fdm); fdm.visible=false; fDots.push(fdm);
}

// ══ SWIPE ═════════════════════════════════════════════════════════
var swX=null, swF=0;
function detectSwipe(lm){
  if(!lm){swX=null;swF=0;return 0;}
  var ax=(lm[8].x+lm[12].x)/2;
  if(swX===null){swX=ax;swF=0;return 0;}
  swF++;
  var delta=swX-ax;
  if(swF>4&&swF<22&&Math.abs(delta)>.17){
    var dir=delta>0?1:-1;
    swX=null;swF=0;
    return dir;
  }
  if(swF>=22){swX=ax;swF=0;}
  return 0;
}

// ══ MODE LABEL ════════════════════════════════════════════════════
var mlEl=document.getElementById('modeLabel'), mlT=null;
function showMode(txt){
  mlEl.textContent=txt; mlEl.style.opacity='1';
  if(mlT) clearTimeout(mlT);
  mlT=setTimeout(function(){mlEl.style.opacity='0';},1800);
}

// ══════════════════════════════════════════════════════════════════
// DRAGON
// ══════════════════════════════════════════════════════════════════
var dG=new THREE.Group(); scene.add(dG);
var wingL,wingR,eyeGL,eyeGR,dBodyGlow;

(function buildDragon(){
  var pMat=new THREE.MeshPhongMaterial({color:0x1a0635,emissive:0x2d0055,shininess:90,specular:0x8800ff});
  var hMat=new THREE.MeshPhongMaterial({color:0x1e0840,emissive:0x380066,shininess:100});

  // Body from cylinder + spheres (NO CapsuleGeometry)
  dG.add(new THREE.Mesh(new THREE.CylinderGeometry(.44,.55,1.4,10),pMat));
  var st=new THREE.Mesh(new THREE.SphereGeometry(.44,10,8),pMat); st.position.y=.7; dG.add(st);
  var sb=new THREE.Mesh(new THREE.SphereGeometry(.55,10,8),pMat); sb.position.y=-.7; dG.add(sb);

  // Head
  var head=new THREE.Mesh(new THREE.SphereGeometry(.38,10,8),hMat);
  head.position.set(0,1.15,.08); head.scale.set(1,.9,1.1); dG.add(head);

  // Snout
  var snout=new THREE.Mesh(new THREE.ConeGeometry(.17,.42,8),hMat);
  snout.rotation.x=Math.PI/2; snout.position.set(0,1.1,.5); dG.add(snout);

  // Eyes
  var eM=new THREE.MeshBasicMaterial({color:0xff2200});
  var eL=new THREE.Mesh(new THREE.SphereGeometry(.08,8,8),eM); eL.position.set(-.18,1.3,.27); dG.add(eL);
  var eR=eL.clone(); eR.position.set(.18,1.3,.27); dG.add(eR);
  eyeGL=new THREE.PointLight(0xff2200,1.8,2.5); eyeGL.position.copy(eL.position); dG.add(eyeGL);
  eyeGR=new THREE.PointLight(0xff2200,1.8,2.5); eyeGR.position.copy(eR.position); dG.add(eyeGR);

  // Horns
  var hornM=new THREE.MeshPhongMaterial({color:0x550099,emissive:0x220044});
  var hL=new THREE.Mesh(new THREE.ConeGeometry(.05,.35,6),hornM); hL.position.set(-.16,1.6,0); hL.rotation.z=-.3; dG.add(hL);
  var hR=hL.clone(); hR.position.set(.16,1.6,0); hR.rotation.z=.3; dG.add(hR);

  // Wings
  function makeWing(side){
    var wg=new THREE.Group();
    var shape=new THREE.Shape();
    shape.moveTo(0,0); shape.lineTo(2.1,.25); shape.lineTo(1.9,.85);
    shape.lineTo(1.3,.5); shape.lineTo(1.0,1.15); shape.lineTo(.55,.55);
    shape.lineTo(.25,.95); shape.lineTo(0,.4); shape.closePath();
    var wm=new THREE.MeshPhongMaterial({color:0x2d0060,emissive:0x110033,side:THREE.DoubleSide,transparent:true,opacity:.87,shininess:50});
    wg.add(new THREE.Mesh(new THREE.ShapeGeometry(shape,3),wm));
    for(var i=1;i<=5;i++){
      var pts=[new THREE.Vector3(0,0,0),new THREE.Vector3(1.8*(i/5),.15+i*.1,0)];
      var lg=new THREE.BufferGeometry().setFromPoints(pts);
      wg.add(new THREE.Line(lg,new THREE.LineBasicMaterial({color:0xbb00ff,transparent:true,opacity:.5})));
    }
    wg.position.set(side*.5,.2,0); wg.scale.x=side;
    dG.add(wg); return wg;
  }
  wingL=makeWing(-1); wingR=makeWing(1);

  // Tail
  var tc=new THREE.CatmullRomCurve3([
    new THREE.Vector3(0,-.7,0),new THREE.Vector3(.28,-1.2,.1),
    new THREE.Vector3(.48,-1.85,.15),new THREE.Vector3(.28,-2.35,0),new THREE.Vector3(-.1,-2.7,-.1)
  ]);
  dG.add(new THREE.Mesh(new THREE.TubeGeometry(tc,12,.08,6,false),pMat));

  dBodyGlow=new THREE.PointLight(0xaa00ff,2.5,7); dG.add(dBodyGlow);
  dG.scale.setScalar(.78);
})();

// ── Fire ──
var FN=180;
var fPos=new Float32Array(FN*3),fCol=new Float32Array(FN*3),fSz=new Float32Array(FN);
var fVel=[],fLife=new Float32Array(FN),fIdx=0;
for(var fi=0;fi<FN;fi++){fPos[fi*3]=9999;fVel.push(new THREE.Vector3());fLife[fi]=0;}
var fGeo=new THREE.BufferGeometry();
fGeo.setAttribute('position',new THREE.BufferAttribute(fPos,3));
fGeo.setAttribute('color',new THREE.BufferAttribute(fCol,3));
fGeo.setAttribute('size',new THREE.BufferAttribute(fSz,1));
var fireTex=circleTex('rgba(255,190,40,1)','rgba(255,0,0,0)');
var fireSys=new THREE.Points(fGeo,new THREE.PointsMaterial({size:.35,map:fireTex,vertexColors:true,blending:THREE.AdditiveBlending,depthWrite:false,transparent:true}));
scene.add(fireSys);

function spawnFire(o){
  var i=fIdx%FN; fIdx++;
  fPos[i*3]=o.x+(Math.random()-.5)*.28; fPos[i*3+1]=o.y+Math.random()*.18; fPos[i*3+2]=o.z+Math.random()*.35+.25;
  var sp=.035+Math.random()*.055;
  fVel[i].set((Math.random()-.5)*.025,Math.random()*.02,sp+Math.random()*.035);
  fSz[i]=.25+Math.random()*.28; fLife[i]=1;
  fCol[i*3]=1; fCol[i*3+1]=Math.random()*.5; fCol[i*3+2]=0;
}
function updateFire(origin,active){
  for(var i=0;i<FN;i++){
    if(fLife[i]<=0) continue;
    fPos[i*3]+=fVel[i].x; fPos[i*3+1]+=fVel[i].y; fPos[i*3+2]+=fVel[i].z;
    fLife[i]-=.022; fSz[i]*=1.025;
    fCol[i*3+1]=Math.max(0,fLife[i])*.45;
    if(fLife[i]<=0) fPos[i*3]=9999;
  }
  if(active&&origin) for(var k=0;k<5;k++) spawnFire(origin);
  fGeo.attributes.position.needsUpdate=true;
  fGeo.attributes.color.needsUpdate=true;
  fGeo.attributes.size.needsUpdate=true;
}

var drSt={pos:new THREE.Vector3(),tPos:new THREE.Vector3(),sc:1,tSc:1,rY:0,tRY:0,fire:false};

// ══════════════════════════════════════════════════════════════════
// BOXES
// ══════════════════════════════════════════════════════════════════
var bxGroup=new THREE.Group(); scene.add(bxGroup);
var boxes=[],heldBox=null,prevPinch=false,createCD=0;
var BOX_COLS=[0x00f5ff,0xff00aa,0x00ff88,0xffaa00,0x8800ff,0xff4466];

function makeBox(pos){
  var col=BOX_COLS[Math.floor(Math.random()*BOX_COLS.length)];
  var sz=.28+Math.random()*.28;
  var g=new THREE.Group();
  g.add(new THREE.Mesh(new THREE.BoxGeometry(sz,sz,sz),new THREE.MeshPhongMaterial({color:col,emissive:col,emissiveIntensity:.12,transparent:true,opacity:.1})));
  g.add(new THREE.LineSegments(new THREE.EdgesGeometry(new THREE.BoxGeometry(sz,sz,sz)),new THREE.LineBasicMaterial({color:col})));
  g.add(new THREE.Mesh(new THREE.BoxGeometry(sz*1.12,sz*1.12,sz*1.12),new THREE.MeshBasicMaterial({color:col,transparent:true,opacity:.04,side:THREE.BackSide})));
  var pl=new THREE.PointLight(col,1.6,2.8); g.add(pl);
  g.position.copy(pos);
  g.userData={vel:new THREE.Vector3((Math.random()-.5)*.006,(Math.random()-.5)*.006,0),rv:new THREE.Vector3(Math.random()*.012,Math.random()*.012,Math.random()*.006),col:col,held:false};
  bxGroup.add(g); boxes.push(g); return g;
}

// Sparks
var SK=250;
var skPos=new Float32Array(SK*3),skCol=new Float32Array(SK*3),skVel=[],skLf=new Float32Array(SK),skIdx=0;
for(var si=0;si<SK;si++){skPos[si*3]=9999;skVel.push(new THREE.Vector3());skLf[si]=0;}
var skGeo=new THREE.BufferGeometry();
skGeo.setAttribute('position',new THREE.BufferAttribute(skPos,3));
skGeo.setAttribute('color',new THREE.BufferAttribute(skCol,3));
var skTex=circleTex('rgba(255,255,255,1)','rgba(0,220,255,0)');
scene.add(new THREE.Points(skGeo,new THREE.PointsMaterial({size:.11,map:skTex,vertexColors:true,blending:THREE.AdditiveBlending,depthWrite:false,transparent:true})));

function spawnSparks(pos,col){
  var r=(col>>16&0xff)/255,g=(col>>8&0xff)/255,b=(col&0xff)/255;
  for(var k=0;k<7;k++){
    var i=skIdx%SK; skIdx++;
    skPos[i*3]=pos.x;skPos[i*3+1]=pos.y;skPos[i*3+2]=pos.z;
    skVel[i].set((Math.random()-.5)*.1,(Math.random()-.5)*.1,(Math.random()-.5)*.1);
    skLf[i]=1; skCol[i*3]=r;skCol[i*3+1]=g;skCol[i*3+2]=b;
  }
}
function updateSparks(){
  for(var i=0;i<SK;i++){
    if(skLf[i]<=0) continue;
    skPos[i*3]+=skVel[i].x;skPos[i*3+1]+=skVel[i].y;skPos[i*3+2]+=skVel[i].z;
    skLf[i]-=.038; if(skLf[i]<=0) skPos[i*3]=9999;
  }
  skGeo.attributes.position.needsUpdate=true;
}

// ══ HAND TRACKING ═════════════════════════════════════════════════
var handLM=null,prevLM=null;
var statusDot=document.getElementById('statusDot');
var video=document.getElementById('videoEl');

try {
  var mpH=new Hands({locateFile:function(f){return 'https://cdn.jsdelivr.net/npm/@mediapipe/hands/'+f;}});
  mpH.setOptions({maxNumHands:1,modelComplexity:0,minDetectionConfidence:0.65,minTrackingConfidence:0.5});
  mpH.onResults(function(r){
    prevLM=handLM;
    handLM=(r.multiHandLandmarks&&r.multiHandLandmarks.length>0)?r.multiHandLandmarks[0]:null;
    statusDot.className=handLM?'on':'';
  });
  navigator.mediaDevices.getUserMedia({video:{facingMode:'user',width:320,height:240}})
    .then(function(stream){
      video.srcObject=stream;
      video.onloadedmetadata=function(){
        video.play();
        var mc=new Camera(video,{onFrame:async function(){await mpH.send({image:video});},width:320,height:240});
        mc.start();
      };
    })
    .catch(function(e){console.warn('cam:',e);});
} catch(e){console.warn('MP init:',e);}

// ══ MAIN LOOP ═════════════════════════════════════════════════════
var mode=0, t=0, last=performance.now();
var TIPS=[4,8,12,16,20];

function loop(){
  requestAnimationFrame(loop);
  var now=performance.now(),dt=Math.min((now-last)/1000,.05);
  last=now; t+=dt;

  // Swipe detection
  if(handLM){
    var sw=detectSwipe(handLM);
    if(sw!==0){
      mode=(mode+1)%2;
      showMode(mode===0?'~  DRAGON  MODE  ~':'~  BOX  MODE  ~');
      heldBox=null;
    }
  } else detectSwipe(null);

  dG.visible=(mode===0);
  fireSys.visible=(mode===0);
  bxGroup.visible=(mode===1);

  // Cursor
  if(handLM){
    var p=palmPos(handLM);
    cursorG.visible=true;
    cursorG.position.lerp(p,.28);
    cursorG.rotation.z+=dt*1.6;
    for(var fd=0;fd<5;fd++){
      var fp=lm3d(handLM,TIPS[fd]);
      fDots[fd].visible=true;
      fDots[fd].position.lerp(fp,.22);
    }
  } else {
    cursorG.visible=false;
    for(var fd2=0;fd2<5;fd2++) fDots[fd2].visible=false;
  }

  // ─ DRAGON ──────────────────────────────────────────────
  if(mode===0){
    dG.position.y+=Math.sin(t*.85)*.003;
    if(handLM){
      var pp=palmPos(handLM);
      drSt.tPos.copy(pp); drSt.tPos.z=0;
      drSt.tRY=(handLM[9].x-.5)*1.9;
      var sp=handSpread(handLM);
      drSt.tSc=Math.max(.3,Math.min(2.2,.5+sp*4.8));
      drSt.fire=isFist(handLM);
    } else {
      drSt.tPos.set(0,0,0); drSt.tSc=1; drSt.tRY=0; drSt.fire=false;
    }
    dG.position.lerp(drSt.tPos,.07);
    drSt.sc+=(drSt.tSc-drSt.sc)*.07;
    dG.scale.setScalar(drSt.sc*.78);
    drSt.rY+=(drSt.tRY-drSt.rY)*.07;
    dG.rotation.y=drSt.rY;

    var flap=Math.sin(t*3.2)*.42;
    wingL.rotation.z=flap-.18;
    wingR.rotation.z=-flap+.18;

    var ep=.9+Math.sin(t*4.5)*.6;
    eyeGL.intensity=ep; eyeGR.intensity=ep;
    dBodyGlow.intensity=1.6+Math.sin(t*1.8)*.55;

    // Fire position: snout in world space
    var snoutLocal=new THREE.Vector3(0,.92,.55);
    var snoutWorld=snoutLocal.clone().applyEuler(dG.rotation).add(dG.position);
    updateFire(snoutWorld,drSt.fire);
  }

  // ─ BOXES ───────────────────────────────────────────────
  if(mode===1){
    var pinch=handLM?pinchStr(handLM):0;
    var isPinch=pinch>.68;
    if(createCD>0) createCD--;

    if(handLM){
      var hp=palmPos(handLM);
      if(isPinch&&!prevPinch&&createCD<=0){
        var near=null,nDist=1.3;
        for(var bi=0;bi<boxes.length;bi++){
          var bd=boxes[bi].position.distanceTo(hp);
          if(bd<nDist){near=boxes[bi];nDist=bd;}
        }
        if(near){heldBox=near;heldBox.userData.held=true;}
        else {
          heldBox=makeBox(hp.clone());
          heldBox.userData.held=true;
          spawnSparks(hp,heldBox.userData.col);
          createCD=18;
        }
      }
      if(!isPinch&&prevPinch&&heldBox){
        heldBox.userData.held=false;
        heldBox.userData.vel.set((Math.random()-.5)*.014,Math.random()*.01,0);
        spawnSparks(heldBox.position,heldBox.userData.col);
        heldBox=null;
      }
      if(heldBox&&isPinch){
        heldBox.position.lerp(hp,.22);
        if(prevLM){
          heldBox.rotation.y+=(handLM[9].x-prevLM[9].x)*9;
          heldBox.rotation.x+=(handLM[9].y-prevLM[9].y)*9;
        }
      }
    } else {
      if(heldBox){heldBox.userData.held=false;heldBox=null;}
    }
    prevPinch=isPinch;

    for(var bi2=0;bi2<boxes.length;bi2++){
      var b=boxes[bi2];
      if(!b.userData.held){
        b.position.add(b.userData.vel);
        b.rotation.x+=b.userData.rv.x;
        b.rotation.y+=b.userData.rv.y;
        b.rotation.z+=b.userData.rv.z;
        if(Math.abs(b.position.x)>5.5) b.userData.vel.x*=-.9;
        if(Math.abs(b.position.y)>4.2) b.userData.vel.y*=-.9;
        if(Math.random()<.02) spawnSparks(b.position,b.userData.col);
      }
    }
    updateSparks();
  }

  pl1.position.set(Math.sin(t*.5)*7,Math.cos(t*.3)*5,4);
  pl2.position.set(Math.cos(t*.4)*6,Math.sin(t*.6)*4,3);

  renderer.render(scene,cam);
}
loop();

// Touch fallback
canvas.addEventListener('touchmove',function(e){
  var tc=e.touches[0];
  var x=1-tc.clientX/window.innerWidth;
  var y=tc.clientY/window.innerHeight;
  if(!handLM) handLM=[];
  for(var i=0;i<21;i++){
    if(!handLM[i]) handLM[i]={x:.5,y:.5,z:0};
    handLM[i].x=x; handLM[i].y=y;
  }
},{passive:true});

})();
</script>
